<!DOCTYPE html>
<!--[if IE 8 ]><html class="ie" xmlns="http://www.w3.org/1999/xhtml" xml:lang="en-US" lang="en-US"> <![endif]-->
<!--[if (gte IE 9)|!(IE)]><!-->
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en-US" lang="en-US">
<!--<![endif]-->

<head>
    <!-- Basic Page Needs -->
    <meta charset="utf-8">
    <!--[if IE]><meta http-equiv='X-UA-Compatible' content='IE=edge,chrome=1'><![endif]-->
    <title>Dataflow - eCommerce Admin Dashboard HTML Template</title>

    <meta name="description" content="Dataflow – Admin Dashboard HTML Template is a modern, clean, and highly flexible dashboard designed for admin panels, SaaS products, and data-driven web applications. Built with HTML5, CSS3, JavaScript, and jQuery, it focuses on performance, clarity, and ease of customization. The template features a fully responsive layout that works seamlessly across all devices and browsers. Dataflow integrates ApexCharts to deliver clear and interactive data visualizations, including bar, line, and radial charts. With well-structured code and reusable components, it is easy to extend and adapt for CRM systems, analytics platforms, and back-office management tools.">

    <!-- Mobile Specific Metas -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

    <!-- Theme Style -->
    <link rel="stylesheet" type="text/css" href="css/animate.min.css">
    <link rel="stylesheet" type="text/css" href="css/animation.css">
    <link rel="stylesheet" type="text/css" href="css/bootstrap.css">
    <link rel="stylesheet" type="text/css" href="css/bootstrap-select.min.css">
    <link rel="stylesheet" type="text/css" href="css/styles.css">



    <!-- Font -->
    <link rel="stylesheet" href="font/fonts.css">

    <!-- Icon -->
    <link rel="stylesheet" href="icon/style.css">

    <!-- Favicon and Touch Icons  -->
    <link rel="shortcut icon" href="images/favicon.png">
    <link rel="apple-touch-icon-precomposed" href="images/favicon.png">

</head>

<body class="body">

    <!-- #wrapper -->
    <div id="wrapper">
        <!-- #page -->
        <div id="page" class="">
            <div class="login-page">
                <div class="left">
                    <img src="images/images-section/sign-in.jpg" alt="image">
                </div>
                <div class="right">
                    <div class="login-box">
                        <form class="form-login flex flex-column gap22 w-full" action="index.html">
                            <div>
                                <h3>Reset your password</h3>
                            </div>
                            <fieldset class="email">
                                <div class="body-title mb-10 text-white">Email address <span class="tf-color-1">*</span></div>
                                <input class="flex-grow" type="email" placeholder="Enter your email address" name="email" tabindex="0" value="" required="">
                            </fieldset>
                            <fieldset class="password">
                                <div class="body-title mb-10 text-white">Password <span class="tf-color-1">*</span></div>
                                <input class="password-input" type="password" placeholder="Enter your password" name="password" tabindex="0" value="" required="">
                                <span class="show-pass">
                                    <i class="icon-eye view"></i>
                                    <i class="icon-eye-off hide"></i>
                                </span>
                            </fieldset>
                            <fieldset class="password">
                                <div class="body-title mb-10 text-white">Confirm Password <span class="tf-color-1">*</span></div>
                                <input class="password-input" type="password" placeholder="Confirm password" name="password" tabindex="0" value="" required="">
                                <span class="show-pass">
                                    <i class="icon-eye view"></i>
                                    <i class="icon-eye-off hide"></i>
                                </span>
                            </fieldset>
                            <button type="submit" class="tf-button w-full">Submit</button>
                        </form>

                        <div class="bottom body-text text-center text-center text-white w-full">
                            Already have account? 
                            <a href="login.html" class="body-text tf-color">Sign in here</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- /#page -->
    </div>
    <!-- /#wrapper -->
    
    <!-- Javascript -->
    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/bootstrap-select.min.js"></script>
    <script defer src="js/main.js"></script>

</body>

</html>
