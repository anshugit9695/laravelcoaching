

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Login</title>

  <!-- CSS -->
  <link rel="stylesheet" href="login.css">

  <!-- Bootstrap (optional for button) -->
</head>

<body>
<section>

  <!-- Animation Leaves -->
  <div class="leaves">
    <div class="set">
      <div><img src="images/login/leaf_01.png"></div>
      <div><img src="images/login/leaf_02.png"></div>
      <div><img src="images/login/leaf_03.png"></div>
      <div><img src="images/login/leaf_04.png"></div>
    </div>
  </div>

  <!-- Background Images -->
  <img src="images/login/bg.jpg" class="bg">
  <img src="images/login/girl.png" class="girl">
  <img src="images/login/trees.png" class="trees">

  <!-- Login Box -->
  <div class="login">
    <h2>Student Login</h2>

    <form method="POST" action="">
      
      <div class="inputBox">
        <input type="text" name="name" placeholder="Enter your Roll No."
          value="" required>
      </div>

      <div class="inputBox">
        <input type="text" name="pass" placeholder="DD-MM-YYYY"
          value="" required>
      </div>

      <div class="inputBox">
        <input type="submit" name="submit" value="Login" id="btn">
      </div>

      <div style="text-align:center; margin-top:10px;">
        <a href="forgot-password.html">Forgot Password?</a>
      </div>

    </form>
  </div>

</section>
</body>
</html>
